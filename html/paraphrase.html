<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12 Master Paraphrasing Techniques</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Smooth fade transition */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div
        class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col h-[85vh] sm:h-auto sm:min-h-[750px]">

        <!-- Header -->
        <div class="bg-indigo-600 text-white px-6 py-4 flex justify-between items-center shadow-md z-10">
            <h1 class="text-xl sm:text-2xl font-bold flex items-center gap-2">
                <i data-lucide="book-open-check"></i>
                Master Paraphrasing
            </h1>
            <div class="bg-indigo-800 px-4 py-1 rounded-full text-sm font-semibold tracking-wide">
                <span id="page-indicator">Page 1 of 12</span>
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-grow overflow-y-auto p-6 sm:p-10 fade-in" id="content-container">
            <!-- Dynamic Content Injected Here -->
        </div>

        <!-- Footer / Navigation -->
        <div class="bg-slate-50 border-t border-slate-200 px-6 py-4 flex justify-between items-center z-10">
            <button id="btn-prev"
                class="flex items-center gap-2 px-5 py-2.5 rounded-xl font-medium transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed bg-white border border-slate-300 text-slate-700 hover:bg-slate-100 hover:shadow-sm">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                Previous
            </button>

            <!-- Progress Dots (Hidden on very small screens) -->
            <div class="hidden sm:flex gap-1.5" id="progress-dots">
                <!-- Dots injected via JS -->
            </div>

            <button id="btn-next"
                class="flex items-center gap-2 px-5 py-2.5 rounded-xl font-medium transition-all duration-200 bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-md hover:-translate-y-0.5">
                Next
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>

    </div>

    <script src="../js/paraphrase.js"></script>
</body>

</html>
